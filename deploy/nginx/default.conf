# #1155 — Per-IP rate limiting for /graphql
# 100 req/min for authenticated (Bearer present), 30 req/min for anonymous.
# Zones defined at http context level; applied in location /graphql below.
limit_req_zone $binary_remote_addr zone=graphql_auth:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=graphql_anon:10m rate=30r/m;

server {
    listen 80;
    server_name api.auraxis.com.br;

    client_max_body_size 10m;

    # Hide server identity — strip upstream (gunicorn) Server header so clients
    # never see backend technology info, and suppress nginx version from error pages.
    server_tokens off;
    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;

    # Consolidate HSTS in one place: nginx is the canonical source.
    # proxy_hide_header strips Flask's own HSTS to prevent the duplicate
    # "Strict-Transport-Security Multiple Header Entries" ZAP finding [10035].
    # This response passes through the ALB to the browser over HTTPS, so the
    # HSTS directive is effective even though nginx listens on HTTP/80 behind ALB.
    proxy_hide_header Strict-Transport-Security;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # SEC-AUD-10 — Unified security-header baseline. The three nginx variants
    # (default.conf, default.tls.conf, default.alb_dual.conf) must emit the
    # same values. Permissions-Policy matches the CloudFront response-headers
    # policy applied to app.auraxis.com.br (SEC-AUD-05). X-XSS-Protection is
    # intentionally absent — deprecated and ignored by modern browsers.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), accelerometer=()" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /healthz {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        access_log off;
    }

    # #1155 — GraphQL rate limiting: authenticated requests get a higher budget.
    # Requests carrying a Bearer token use the graphql_auth zone (100 req/min),
    # all others fall back to graphql_anon (30 req/min). burst=20 allows short
    # spikes without immediate 429; nodelay returns 503 immediately on overflow.
    location /graphql {
        limit_req zone=graphql_anon burst=10 nodelay;
        limit_req zone=graphql_auth burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 30s;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 30s;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
}
