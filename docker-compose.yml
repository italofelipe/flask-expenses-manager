services:
  db:
    image: ${POSTGRES_IMAGE:-public.ecr.aws/docker/library/postgres:16}
    # [PERF-GAP-03] Slow query log: queries ≥500ms are logged to stdout.
    # View with: docker compose logs db | grep duration
    command:
      - "postgres"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_line_prefix=%m [%p] %q%u@%d "
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: ${REDIS_IMAGE:-public.ecr.aws/docker/library/redis:7-alpine}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  web:
    image: ${WEB_IMAGE:-auraxis-api-web:local}
    build: .
    ports:
      - "3333:5000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      RATE_LIMIT_REDIS_URL: ${RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}
      LOGIN_GUARD_REDIS_URL: ${LOGIN_GUARD_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  redisdata:
