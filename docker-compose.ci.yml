services:
  db:
    image: ${POSTGRES_IMAGE:-public.ecr.aws/docker/library/postgres:16}
    pull_policy: if_not_present
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_ci:/var/lib/postgresql/data

  redis:
    image: ${REDIS_IMAGE:-public.ecr.aws/docker/library/redis:7-alpine}
    pull_policy: if_not_present
    ports:
      - "6379:6379"
    volumes:
      - redisdata_ci:/data

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE must be set for CI compose runs}
    pull_policy: never
    ports:
      - "3333:5000"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      RATE_LIMIT_REDIS_URL: ${RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}
      LOGIN_GUARD_REDIS_URL: ${LOGIN_GUARD_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - db
      - redis

volumes:
  pgdata_ci:
  redisdata_ci:
