sonar.projectName=auraxis
sonar.sourceEncoding=UTF-8

sonar.sources=app
sonar.tests=tests
sonar.exclusions=**/__pycache__/**,.venv/**,migrations/**
sonar.python.coverage.reportPaths=coverage.xml

# ── Duplication exclusions ────────────────────────────────────────────────────
# contracts.py files in each controller are intentional thin adapters that
# forward to app.controllers.response_contract. They are structurally identical
# by design (same compat_success/compat_error signature per controller).
sonar.cpd.exclusions=**/controllers/**/contracts.py,**/tests/helpers.py

# ── Sonar issue suppressions ──────────────────────────────────────────────────
# S2068/S6336 (hardcoded credentials) — test fixtures are intentional mock values,
# not real secrets. Suppressed only for test files.
# e3: S2068 in controllers — OpenAPI documentation examples (e.g. example={"password":...})
# are illustrative mock values in @doc decorators, not real credentials.
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/tests/**
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S6336
sonar.issue.ignore.multicriteria.e2.resourceKey=**/tests/**
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e3.resourceKey=**/controllers/**
