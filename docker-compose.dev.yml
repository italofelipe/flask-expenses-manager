services:
  db:
    image: ${POSTGRES_IMAGE:-public.ecr.aws/docker/library/postgres:16}
    restart: unless-stopped
    # [PERF-GAP-03] Slow query log: queries ≥500ms are logged to stdout.
    # View with: docker compose logs db | grep duration
    command:
      - "postgres"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_line_prefix=%m [%p] %q%u@%d "
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-public.ecr.aws/docker/library/redis:7-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${WEB_IMAGE:-auraxis-api-web:dev}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: flask run --host=0.0.0.0 --port=5000
    ports:
      - "3333:5000"
    volumes:
      - .:/app
    env_file:
      - .env.dev
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "true"
      AUTO_CREATE_DB: "true"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      RATE_LIMIT_REDIS_URL: "${RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}"
      LOGIN_GUARD_REDIS_URL: "${LOGIN_GUARD_REDIS_URL:-redis://redis:6379/0}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata_dev:
  redis_dev:
