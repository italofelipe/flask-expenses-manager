title = "Auraxis API — Gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Test fixtures — mock credentials are intentional and not real secrets"
paths = [
  '''tests/.*''',
  '''.*_test\.py''',
  '''.*\.spec\.py''',
]

[[allowlists]]
description = "OpenAPI spec — example tokens in API documentation are not real secrets"
paths = [
  '''openapi\.json''',
]

[[allowlists]]
description = "Test fixture values — known mock credential patterns"
regexTarget = "match"
regexes = [
  '''Test@\d+''',
  '''test_secret''',
  '''mock_token''',
  '''fake_token''',
  '''test_password''',
  '''TestPass\w*''',
  '''Password@\w*''',
  '''Senha@\w*''',
  '''StrongPass@\w+''',
  # Synthetic JWT header {"alg":"HS256"} used by AI minimization tests (#1258)
  '''eyJhbGciOiJIUzI1NiJ9\.eyJzdWIiOiIxIn0\.abcdef''',
]

[[allowlists]]
description = "HTTP status codes in comments/docstrings — not secrets"
stopwords = [
  "401-equivalent",
  "HTTP 401",
  "HTTP 403",
]
