repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.5
  hooks:
  - id: ruff-check
    args: ["--fix"]
  - id: ruff-format

- repo: https://github.com/pycqa/bandit
  rev: 1.8.6
  hooks:
  - id: bandit
    name: bandit (app high severity gate)
    args: ["-q", "-r", "app", "-lll", "-iii"]
    pass_filenames: false

- repo: https://github.com/gitleaks/gitleaks
  rev: v8.28.0
  hooks:
  - id: gitleaks
    args: ["--staged", "--redact", "--verbose", "--config=.gitleaks.toml"]
    pass_filenames: false

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: detect-private-key

- repo: local
  hooks:
  - id: mypy
    name: mypy
    entry: scripts/python_tool.sh mypy app
    language: system
    pass_filenames: false
  - id: sonar-local-check
    name: sonar-local-check
    entry: scripts/sonar_local_check.sh
    language: system
    pass_filenames: false
    always_run: true
  - id: security-evidence
    name: security-evidence (OWASP S3)
    entry: bash scripts/security_evidence_check.sh
    language: system
    pass_filenames: false
    stages: [pre-push]
  - id: pip-audit
    name: pip-audit (dependencies)
    entry: scripts/python_tool.sh pip_audit -r requirements.txt --ignore-vuln GHSA-5239-wwwm-4pmq
    language: system
    pass_filenames: false
    stages: [pre-push]
