repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.5
  hooks:
  - id: ruff-check
    args: ["--fix"]
  - id: ruff-format

- repo: https://github.com/pycqa/bandit
  rev: 1.8.6
  hooks:
  - id: bandit
    name: bandit (app high severity gate)
    args: ["-q", "-r", "app", "-lll", "-iii"]
    pass_filenames: false

- repo: https://github.com/gitleaks/gitleaks
  rev: v8.28.0
  hooks:
  - id: gitleaks
    args: ["--staged", "--redact", "--verbose", "--config=.gitleaks.toml"]
    pass_filenames: false

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: detect-private-key

- repo: local
  hooks:
  - id: repo-hygiene-check
    name: repo-hygiene-check
    entry: python3 scripts/repo_hygiene_check.py
    language: system
    pass_filenames: false
  - id: graphql-auth-config-check
    name: graphql-auth-config-check
    entry: python3 scripts/graphql_auth_config_check.py
    language: system
    pass_filenames: false
  - id: graphql-mutation-audit
    name: graphql-mutation-audit (ADR-0002)
    entry: python3 scripts/graphql_mutation_audit.py
    language: system
    pass_filenames: false
    files: app/graphql/mutations/
  - id: alembic-single-head-check
    name: alembic-single-head-check
    entry: python3 scripts/alembic_single_head_check.py
    language: system
    pass_filenames: false
  - id: mypy
    name: mypy
    entry: scripts/python_tool.sh mypy --no-incremental app
    language: system
    pass_filenames: false
  - id: sonar-local-check
    name: sonar-local-check
    entry: scripts/sonar_local_check.sh
    language: system
    pass_filenames: false
    always_run: true
  - id: postman-collection-contract
    name: postman-collection-contract
    entry: scripts/python_tool.sh pytest tests/test_postman_collection_contract.py -x -q
    language: system
    pass_filenames: false
    files: (openapi\.json|openapi_to_postman\.py|postman_collection\.json|postman_environment\.json)
  - id: security-evidence
    name: security-evidence (OWASP S3)
    entry: bash scripts/security_evidence_check.sh
    language: system
    pass_filenames: false
    stages: [pre-push]
  - id: pip-audit
    name: pip-audit (dependencies)
    entry: bash -lc 'python3 scripts/security_exception_governance.py check && scripts/python_tool.sh pip_audit -r requirements.txt $(python3 scripts/security_exception_governance.py pip-audit-args)'
    language: system
    pass_filenames: false
    stages: [pre-push]
