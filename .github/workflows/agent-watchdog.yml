name: Agent — Watchdog

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

jobs:
  watchdog:
    name: Watchdog — CI failure triage
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    permissions:
      contents: read
      issues: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Check for existing open incident issue
        id: check_existing
        run: |
          EXISTING=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "incident" \
            --state open \
            --json number,title \
            --jq ".[0].number // empty")
          echo "existing=$EXISTING" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB_ADMIN }}

      - name: Create incident issue
        if: steps.check_existing.outputs.existing == ''
        run: |
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${COMMIT:0:7}"

          gh issue create \
            --repo ${{ github.repository }} \
            --title "incident: CI failure on ${BRANCH} @ ${SHORT_SHA}" \
            --label "incident,bug" \
            --body "## CI Failure Detected

          **Branch:** \`${BRANCH}\`
          **Commit:** \`${SHORT_SHA}\`
          **Workflow run:** ${WORKFLOW_URL}
          **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')

          ## What to do

          1. Check the workflow run logs at the link above
          2. Identify failing job(s)
          3. Add label \`agent:claude\` to assign investigation to the backend agent

          > This issue was created automatically by the Watchdog agent."
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB_ADMIN }}

      - name: Comment on existing incident
        if: steps.check_existing.outputs.existing != ''
        run: |
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${COMMIT:0:7}"

          gh issue comment ${{ steps.check_existing.outputs.existing }} \
            --repo ${{ github.repository }} \
            --body "CI still failing — commit \`${SHORT_SHA}\`. Run: ${WORKFLOW_URL}"
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB_ADMIN }}

      # ── Telemetry (Housekeeping R2/3.3 — mirror of agent-implement step) ─
      # Identifier for watchdog is the upstream CI run id, since each invocation
      # corresponds to a unique failed run.
      - name: Capture agent run telemetry
        if: always()
        env:
          UPSTREAM_RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
          STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/agent-runs"
          TS="$(date -u +%Y-%m-%dT%H:%M:%S+00:00)"
          SAFE_TS="$(echo "$TS" | tr ':' '-')"
          OUT="$RUNNER_TEMP/agent-runs/${SAFE_TS}-watchdog-${UPSTREAM_RUN_ID}.json"
          TS="$TS" UPSTREAM_RUN_ID="$UPSTREAM_RUN_ID" REPO="$REPO" \
            STATUS="$STATUS" RUN_ID="$RUN_ID" OUT="$OUT" \
            python3 - <<'PYEOF'
          import json, os
          data = {
              "timestamp": os.environ["TS"],
              "role": "watchdog",
              "issue": f"ci-{os.environ['UPSTREAM_RUN_ID']}",
              "repo": os.environ["REPO"],
              "model": "claude-opus-4-7",
              "input_tokens": 0,
              "output_tokens": 0,
              "pr_number": None,
              "pr_merged": False,
              "files_modified": [],
              "job_status": os.environ.get("STATUS", "unknown"),
              "run_id": os.environ.get("RUN_ID", ""),
              "upstream_ci_run_id": os.environ["UPSTREAM_RUN_ID"],
          }
          with open(os.environ["OUT"], "w") as f:
              json.dump(data, f, indent=2)
          print(os.environ["OUT"])
          PYEOF

      - name: Upload telemetry artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-telemetry-watchdog-${{ github.event.workflow_run.id }}
          path: ${{ runner.temp }}/agent-runs/
          retention-days: 30
          if-no-files-found: warn
