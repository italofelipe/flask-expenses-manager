name: Recurrence Job

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: recurrence-job-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-recurring-transactions:
    name: Generate Recurring Transactions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run recurrence generation script
        env:
          DATABASE_URL: ${{ secrets.RECURRENCE_DATABASE_URL }}
          SECRET_KEY: ${{ secrets.RECURRENCE_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.RECURRENCE_JWT_SECRET_KEY }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "RECURRENCE_DATABASE_URL não configurado. Job ignorado."
            exit 0
          fi
          python scripts/generate_recurring_transactions.py

      - name: Notify failure via GitHub Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();
            const title = '🚨 [recurrence-job] Falha na geração de transações recorrentes';
            const issueBody = [
              '## Recurrence Job falhou',
              '',
              `**Última falha:** ${now}`,
              `**Run:** ${runUrl}`,
              '',
              'O job agendado de geração de transações recorrentes falhou.',
              'Verifique os logs do workflow e o estado do banco de dados de produção.',
              '',
              '### Ações sugeridas',
              '- Revisar logs da execução no link acima',
              '- Verificar conectividade com `RECURRENCE_DATABASE_URL`',
              '- Executar `scripts/generate_recurring_transactions.py` manualmente se necessário',
              '',
              '_Issue criada automaticamente pelo GitHub Actions._',
            ].join('\n');
            const commentBody = [
              'Nova falha detectada no recurrence job.',
              '',
              `- Data: ${now}`,
              `- Run: ${runUrl}`,
            ].join('\n');
            const query = [
              `repo:${context.repo.owner}/${context.repo.repo}`,
              'is:issue',
              'in:title',
              `"${title}"`,
            ].join(' ');
            const search = await github.rest.search.issuesAndPullRequests({
              q: query,
              per_page: 10,
            });
            const matchingIssue = search.data.items.find(
              (item) => item.title === title,
            );

            if (matchingIssue) {
              if (matchingIssue.state === 'closed') {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: matchingIssue.number,
                  state: 'open',
                });
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: matchingIssue.number,
                body: commentBody,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: issueBody,
              labels: ['bug', 'ops'],
            });
