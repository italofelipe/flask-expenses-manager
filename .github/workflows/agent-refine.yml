name: Agent — Refine Issue

on:
  issue_comment:
    types: [created]

jobs:
  refine:
    name: PO Assistant — Refine spec
    runs-on: ubuntu-latest
    if: |
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude refine') &&
      github.event.comment.user.login != 'github-actions[bot]'
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: React with eyes emoji
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST -f content=eyes
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB_ADMIN }}

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.TOKEN_GITHUB_ADMIN }}
          max_turns: "20"
          prompt: |
            You are the PO Assistant agent for the Auraxis project — a personal finance platform
            built with Python/Flask/GraphQL on the backend.

            Your task: refine GitHub issue #${{ github.event.issue.number }} in repository
            ${{ github.repository }}.

            ## What to do

            1. Read the issue:
               gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json title,body,labels

            2. Read 2-3 relevant files in the codebase to understand the technical context.
               Focus on the modules most likely affected by this issue.

            3. Edit the issue body with the following structured spec (write in the same language
               as the original issue — Portuguese if Portuguese, English if English):

            ```
            ## Objetivo
            <user story: Como [persona], quero [ação] para [benefício]>

            ## Contexto técnico
            <2-3 linhas: qual parte do codebase é afetada>

            ## Análise SWOT técnica
            | | Positivo | Negativo |
            |--|---------|---------|
            | **Interno** | **Strengths:** <...> | **Weaknesses:** <...> |
            | **Externo** | **Opportunities:** <...> | **Threats:** <...> |

            ## Viabilidade
            - **Esforço estimado:** <P (<2h) / M (2-8h) / G (8-24h) / XG (>24h)>
            - **Risco:** <LOW / MEDIUM / HIGH>
            - **Dependências:** <issues/PRs bloqueantes ou "nenhuma">
            - **Breaking change:** <Sim/Não — REST? GraphQL? Schema?>

            ## Sub-tasks
            - [ ] <sub-task específica e implementável>
            - [ ] Tests: <o que precisa ser testado>

            ## Acceptance criteria
            - [ ] <critério mensurável>
            - [ ] Cobertura de testes ≥ 85%
            - [ ] CI verde

            ## Notas de implementação
            <padrões a seguir, armadilhas conhecidas>
            ```

            4. Apply labels:
               gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} \
                 --add-label "needs-po-approval" --remove-label "agent:claude"

            5. Post a comment:
               gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
                 --body "Spec refinada ✓ Revise e adicione a label \`agent:claude\` para iniciar a implementação."

            ## Rules
            - Never invent technical details not found in the code — read first, then assert
            - If the issue is too vague to estimate effort, mark as M with uncertainty note
            - If breaking change: add a bold warning at the top of the spec
            - Do NOT write any implementation code
