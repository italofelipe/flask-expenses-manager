name: CI

on:
  push:
    branches:
      - main
      - develop
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (Ruff + Type Check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Feature Flags Hygiene
        run: python scripts/check_feature_flags.py

      - name: Repo Hygiene
        run: python scripts/repo_hygiene_check.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Security exception governance
        run: python3 scripts/security_exception_governance.py check

      - name: Dependency vulnerability scan
        run: |
          python -m pip_audit -r requirements.txt \
            $(python3 scripts/security_exception_governance.py pip-audit-args)

      - name: Ruff format (check)
        run: python -m ruff format --check .

      - name: Ruff lint
        run: python -m ruff check app tests config run.py run_without_db.py

      - name: Mypy
        run: python -m mypy --no-incremental app

      - name: Bandit (SAST - high severity gate)
        run: python -m bandit -r app -lll -iii

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source . --verbose --redact --config .gitleaks.toml

  dependency-review:
    name: Dependency Review (PR gate)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  review-signal:
    name: Review Signal (Cursor Bugbot)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate PR review signal (advisory)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/pr_review_signal_check.py \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${PR_NUMBER}" \
            --mode advisory

  pr-traceability:
    name: PR Traceability (Advisory)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Summarize PR traceability
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/pr_traceability_check.py \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${PR_NUMBER}" \
            pr-summary \
            --write-summary

  tests:
    name: Tests (Pytest + Coverage)
    runs-on: ubuntu-latest
    needs: [quality, secret-scan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest -m "not schemathesis" --cov=app --cov-fail-under=85 --cov-report=xml --cov-report=term-missing --junitxml=pytest-report.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload pytest report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml

  ci-runtime-images:
    name: CI Runtime Images
    runs-on: ubuntu-latest
    needs: [quality, secret-scan]
    env:
      DOCKER_CONFIG: /tmp/docker-public
      CI_IMAGE_TAG_SUFFIX: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reset Docker auth for public pulls
        run: |
          mkdir -p "$DOCKER_CONFIG"
          printf '{}\n' > "$DOCKER_CONFIG/config.json"
          docker logout docker.io || true
          docker logout https://index.docker.io/v1/ || true

      - name: Build canonical runtime images
        run: |
          mkdir -p reports/ci-images
          bash scripts/ci_image_artifact.sh build dev
          bash scripts/ci_image_artifact.sh build prod
          bash scripts/ci_image_artifact.sh save "$(bash scripts/ci_image_artifact.sh ref dev)" reports/ci-images/runtime-dev.tar.gz
          bash scripts/ci_image_artifact.sh save "$(bash scripts/ci_image_artifact.sh ref prod)" reports/ci-images/runtime-prod.tar.gz

      - name: Summarize image supply chain
        run: |
          {
            echo "## CI runtime image supply chain"
            echo
            echo "- Dev image: \`$(bash scripts/ci_image_artifact.sh ref dev)\`"
            echo "- Prod image: \`$(bash scripts/ci_image_artifact.sh ref prod)\`"
            echo "- Mirrors: \`public.ecr.aws/docker/library/python\`, \`public.ecr.aws/docker/library/postgres\`, \`public.ecr.aws/docker/library/redis\`"
            echo "- Reuse policy: smoke/full/security consume the same built artifacts"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dev runtime image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-runtime-image-dev
          path: reports/ci-images/runtime-dev.tar.gz
          retention-days: 1

      - name: Upload prod runtime image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-runtime-image-prod
          path: reports/ci-images/runtime-prod.tar.gz
          retention-days: 1

  api-smoke:
    name: API Smoke (Postman/Newman)
    runs-on: ubuntu-latest
    needs: [tests, ci-runtime-images]
    env:
      DOCKER_CONFIG: /tmp/docker-public
      WEB_IMAGE: auraxis-ci-dev:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install smoke dependencies
        run: npm ci

      - name: Prepare environment file
        run: cp .env.dev.example .env

      - name: Download runtime image artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-runtime-image-dev
          path: reports/ci-images

      - name: Reset Docker auth for public pulls
        run: |
          mkdir -p "$DOCKER_CONFIG"
          printf '{}\n' > "$DOCKER_CONFIG/config.json"
          docker logout docker.io || true
          docker logout https://index.docker.io/v1/ || true

      - name: Load runtime image
        run: bash scripts/ci_image_artifact.sh load reports/ci-images/runtime-dev.tar.gz

      - name: Bootstrap smoke stack
        run: |
          python3 scripts/ci_stack_bootstrap.py bootstrap \
            --compose-file docker-compose.ci.yml \
            --reports-dir reports/ci-stack/smoke \
            --report-path reports/ci-stack/smoke/bootstrap-report.json

      - name: Run Postman smoke suite
        run: npm run postman:smoke:ci

      - name: Enforce HTTP latency budget
        run: |
          python3 scripts/http_latency_budget_gate.py \
            --base-url http://localhost:3333 \
            --samples 3

      - name: Summarize smoke release gate
        if: always()
        run: |
          {
            echo "## API release gate: smoke"
            echo
            echo "- Profile: \`smoke\`"
            echo "- Purpose: fast pre-merge black-box validation across critical domains"
            echo "- Policy: this gate must pass before the dedicated \`full\` integration gate starts"
            echo "- Artifact: \`newman-smoke-report\` (\`reports/newman-smoke-report.xml\`)"
            echo "- Canonical runner: \`scripts/run_postman_suite.sh --profile smoke\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-smoke-report
          path: reports/newman-smoke-report.xml

      - name: Upload latency budget report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-latency-budget-report
          path: reports/performance/http-latency-budget.json

      - name: Dump stack logs on failure
        if: failure()
        run: |
          python3 scripts/ci_stack_bootstrap.py dump-state \
            --compose-file docker-compose.ci.yml \
            --reports-dir reports/ci-stack/smoke \
            --prefix failure

      - name: Tear down local stack
        if: always()
        run: python3 scripts/ci_stack_bootstrap.py teardown --compose-file docker-compose.ci.yml

      - name: Upload smoke stack diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-stack-smoke-diagnostics
          path: reports/ci-stack/smoke

  api-integration:
    name: API Release Gate (Postman/Newman Full)
    runs-on: ubuntu-latest
    needs: [api-smoke, ci-runtime-images]
    env:
      DOCKER_CONFIG: /tmp/docker-public
      WEB_IMAGE: auraxis-ci-dev:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install integration dependencies
        run: npm ci

      - name: Prepare environment file
        run: cp .env.dev.example .env

      - name: Download runtime image artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-runtime-image-dev
          path: reports/ci-images

      - name: Reset Docker auth for public pulls
        run: |
          mkdir -p "$DOCKER_CONFIG"
          printf '{}\n' > "$DOCKER_CONFIG/config.json"
          docker logout docker.io || true
          docker logout https://index.docker.io/v1/ || true

      - name: Load runtime image
        run: bash scripts/ci_image_artifact.sh load reports/ci-images/runtime-dev.tar.gz

      - name: Bootstrap integration stack
        run: |
          python3 scripts/ci_stack_bootstrap.py bootstrap \
            --compose-file docker-compose.ci.yml \
            --reports-dir reports/ci-stack/full \
            --report-path reports/ci-stack/full/bootstrap-report.json

      - name: Run Postman full integration suite
        run: npm run postman:full:ci

      - name: Summarize full release gate
        if: always()
        run: |
          {
            echo "## API release gate: full"
            echo
            echo "- Profile: \`full\`"
            echo "- Purpose: dedicated release-gate integration coverage for the canonical REST + GraphQL surface"
            echo "- Policy: release readiness depends on \`smoke\` and \`full\` both passing; \`privileged\` remains manual and out of the common merge path"
            echo "- Artifact: \`newman-full-report\` (\`reports/newman-full-report.xml\`)"
            echo "- Canonical runner: \`scripts/run_postman_suite.sh --profile full\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Newman full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-full-report
          path: reports/newman-full-report.xml

      - name: Dump stack logs on failure
        if: failure()
        run: |
          python3 scripts/ci_stack_bootstrap.py dump-state \
            --compose-file docker-compose.ci.yml \
            --reports-dir reports/ci-stack/full \
            --prefix failure

      - name: Tear down local stack
        if: always()
        run: python3 scripts/ci_stack_bootstrap.py teardown --compose-file docker-compose.ci.yml

      - name: Upload full stack diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-stack-full-diagnostics
          path: reports/ci-stack/full

  schemathesis:
    name: API Reliability (Schemathesis)
    runs-on: ubuntu-latest
    needs: [quality, secret-scan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Schemathesis contract checks
        env:
          SCHEMATHESIS_MAX_EXAMPLES: 5
          HYPOTHESIS_SEED: 20260220
        run: |
          bash scripts/run_schemathesis_contract.sh

  mutation:
    name: Mutation Testing (Cosmic Ray)
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run mutation gate
        env:
          MUTATION_MAX_SURVIVAL_PERCENT: 0.0
        run: |
          bash scripts/mutation_gate.sh

  trivy:
    name: Container Security (Trivy)
    runs-on: ubuntu-latest
    needs: [tests, ci-runtime-images]
    env:
      DOCKER_CONFIG: /tmp/docker-public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy FS scan (repo)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Reset Docker auth for public pulls
        run: |
          mkdir -p "$DOCKER_CONFIG"
          printf '{}\n' > "$DOCKER_CONFIG/config.json"
          docker logout docker.io || true
          docker logout https://index.docker.io/v1/ || true

      - name: Download prod runtime image artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-runtime-image-prod
          path: reports/ci-images

      - name: Load image for scan
        run: bash scripts/ci_image_artifact.sh load reports/ci-images/runtime-prod.tar.gz

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: auraxis-ci-prod:${{ github.sha }}
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: 1

  osv-scanner:
    name: Dependency Security (OSV-Scanner)
    runs-on: ubuntu-latest
    needs: [tests, trivy]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OSV-Scanner
        run: |
          bash scripts/run_osv_scanner.sh

      - name: Upload OSV report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: osv-results
          path: reports/security/osv-results.json

  security-evidence:
    name: Security Evidence (S3)
    runs-on: ubuntu-latest
    needs: [tests, schemathesis]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run security evidence checks
        run: |
          bash scripts/security_evidence_check.sh

      - name: Upload security evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence
          path: reports/security/security-evidence.md

  sonar:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    needs: [tests, schemathesis, mutation, trivy, osv-scanner, security-evidence]

    steps:
      - name: Check Sonar capability
        id: capability
        env:
          SONAR_TOKEN_VALUE: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "${SONAR_TOKEN_VALUE:-}" ] && [ -n "${{ vars.SONAR_PROJECT_KEY }}" ] && [ -n "${{ vars.SONAR_ORGANIZATION }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SonarQube Cloud skipped: token or repo variables not available for this run."
          fi

      - name: Checkout
        if: steps.capability.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        if: steps.capability.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: SonarQube Scan
        if: steps.capability.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.python.coverage.reportPaths=coverage.xml

      - name: SonarQube Quality Gate
        id: sonar_quality_gate
        if: steps.capability.outputs.enabled == 'true'
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Enforce Sonar Policy (A ratings + no critical bugs)
        id: sonar_policy
        if: steps.capability.outputs.enabled == 'true'
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_BRANCH: ${{ github.head_ref || github.ref_name }}
          SONAR_PULL_REQUEST: ${{ github.event.pull_request.number || '' }}
          SONAR_POLICY_REPORT_PATH: ${{ runner.temp }}/sonar-policy-report.json
        run: |
          bash scripts/sonar_enforce_ci.sh

      - name: Upload Sonar policy report artifact
        if: ${{ always() && steps.capability.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sonar-policy-report
          path: ${{ runner.temp }}/sonar-policy-report.json
          if-no-files-found: ignore

      - name: Summarize Sonar outcome
        if: ${{ always() && steps.capability.outputs.enabled == 'true' }}
        env:
          SONAR_QUALITY_GATE_OUTCOME: ${{ steps.sonar_quality_gate.outcome }}
          SONAR_POLICY_OUTCOME: ${{ steps.sonar_policy.outcome }}
          SONAR_POLICY_REPORT_PATH: ${{ runner.temp }}/sonar-policy-report.json
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          report_path = Path(os.environ["SONAR_POLICY_REPORT_PATH"])
          quality_gate_outcome = os.environ.get("SONAR_QUALITY_GATE_OUTCOME", "unknown")
          policy_outcome = os.environ.get("SONAR_POLICY_OUTCOME", "unknown")

          lines = [
              "## Sonar Outcome",
              "",
              f"- Quality Gate step outcome: `{quality_gate_outcome}`",
              f"- Custom policy step outcome: `{policy_outcome}`",
          ]

          if report_path.exists():
              payload = json.loads(report_path.read_text(encoding="utf-8"))
              errors = payload.get("errors", [])
              lines.append("- Policy artifact: `sonar-policy-report`")
              if quality_gate_outcome == "success" and policy_outcome == "failure":
                  lines.extend([
                      "",
                      "### Why the job is red",
                      "",
                      "The Sonar scan and quality gate completed, but the **custom Auraxis Sonar policy** rejected the run.",
                  ])
              if errors:
                  lines.extend(["", "### Policy rejection details", ""])
                  lines.extend(f"- {error}" for error in errors)
          else:
              lines.extend([
                  "",
                  "### Policy report unavailable",
                  "",
                  "- The custom policy report file was not generated.",
              ])

          with open(summary_path, "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Fail on Sonar gate or policy rejection
        if: >-
          ${{
            steps.capability.outputs.enabled == 'true' &&
            (steps.sonar_quality_gate.outcome == 'failure' || steps.sonar_policy.outcome == 'failure')
          }}
        run: |
          echo "Sonar pipeline failed. Review the Sonar Outcome section in the job summary." >&2
          exit 1
