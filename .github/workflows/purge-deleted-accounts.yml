name: Purge Deleted Accounts (LGPD)

on:
  schedule:
    # Runs every day at 04:00 UTC — after the recurrence job (03:00 UTC)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log eligible accounts without deleting)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      grace_days:
        description: "Grace period in days before hard delete (default: 30)"
        required: false
        default: "30"

concurrency:
  group: purge-deleted-accounts-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  purge-deleted-accounts:
    name: Purge Soft-Deleted Accounts
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          [ -n "${AWS_REGION:-}" ] || { echo "Missing var AWS_REGION"; exit 1; }
          [ -n "${AWS_ROLE_ARN_PROD:-}" ] || { echo "Missing var AWS_ROLE_ARN_PROD"; exit 1; }
          [ -n "${AURAXIS_PROD_INSTANCE_ID:-}" ] || { echo "Missing var AURAXIS_PROD_INSTANCE_ID"; exit 1; }
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ROLE_ARN_PROD: ${{ vars.AWS_ROLE_ARN_PROD }}
          AURAXIS_PROD_INSTANCE_ID: ${{ vars.AURAXIS_PROD_INSTANCE_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Run purge script via SSM
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          PROD_INSTANCE_ID: ${{ vars.AURAXIS_PROD_INSTANCE_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GRACE_DAYS: ${{ github.event.inputs.grace_days || '30' }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${DRY_RUN}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${PROD_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"cd /opt/auraxis-api\",
              \"docker compose exec -T web python scripts/purge_deleted_accounts.py --grace-days ${GRACE_DAYS} ${DRY_RUN_FLAG}\"
            ]" \
            --output text \
            --query "Command.CommandId"

      - name: Notify failure via GitHub Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now = new Date().toISOString();
            const title = '🚨 [purge-deleted-accounts] Falha na purga de contas excluídas (LGPD)';
            const issueBody = [
              '## Purge de contas deletadas falhou',
              '',
              `**Última falha:** ${now}`,
              `**Run:** ${runUrl}`,
              '',
              'O job agendado de purga de contas LGPD falhou via SSM.',
              'Verifique os logs do workflow e o estado da stack de produção.',
              '',
              '### Ações sugeridas',
              '- Revisar logs da execução no link acima',
              '- Verificar o estado de `docker compose` e do container `web` na instância PROD',
              '- Executar `scripts/purge_deleted_accounts.py --dry-run` manualmente para diagnóstico',
              '',
              '_Issue criada automaticamente pelo GitHub Actions._',
            ].join('\n');
            const commentBody = [
              'Nova falha detectada no purge-deleted-accounts job.',
              '',
              `- Data: ${now}`,
              `- Run: ${runUrl}`,
            ].join('\n');
            const query = [
              `repo:${context.repo.owner}/${context.repo.repo}`,
              'is:issue',
              'in:title',
              `"${title}"`,
            ].join(' ');
            const search = await github.rest.search.issuesAndPullRequests({
              q: query,
              per_page: 10,
            });
            const matchingIssue = search.data.items.find(
              (item) => item.title === title,
            );
            if (matchingIssue) {
              if (matchingIssue.state === 'closed') {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: matchingIssue.number,
                  state: 'open',
                });
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: matchingIssue.number,
                body: commentBody,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: issueBody,
              labels: ['bug', 'ops', 'lgpd'],
            });
