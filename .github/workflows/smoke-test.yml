name: Smoke Tests

# Triggered manually or automatically after a successful deploy.
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]

jobs:
  smoke:
    name: Newman Smoke Suite
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install

      - name: Run smoke tests
        run: bash smoke_tests/run_smoke.sh
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}

      - name: Upload Newman results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-smoke-results
          path: smoke_tests/results.json
